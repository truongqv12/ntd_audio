name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Resolve version
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Verify backend/VERSION matches tag
        run: |
          file_version="$(cat backend/VERSION | tr -d '[:space:]')"
          if [ "$file_version" != "${{ steps.ver.outputs.version }}" ]; then
            echo "::error::backend/VERSION ($file_version) does not match tag (${{ steps.ver.outputs.version }})"
            exit 1
          fi
      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          awk -v ver="${{ steps.ver.outputs.version }}" '
            BEGIN { capture=0 }
            /^## \[/ {
              if (capture) { exit }
              if (index($0, "[" ver "]") > 0) { capture=1; next }
            }
            capture { print }
          ' CHANGELOG.md > /tmp/release_notes.md || true
          echo "notes_path=/tmp/release_notes.md" >> "$GITHUB_OUTPUT"
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: VoiceForge ${{ github.ref_name }}
          body_path: ${{ steps.notes.outputs.notes_path }}
          draft: false
          prerelease: false
