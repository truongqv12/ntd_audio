services:
  piper-runtime:
    build:
      context: ./engines/piper-runtime
    environment:
      PIPER_DATA_DIR: /data/piper
      PIPER_VOICE_IDS: ${PIPER_VOICE_IDS:-vi_VN-vais1000-medium,en_US-lessac-medium,en_GB-alan-medium}
      PIPER_DOWNLOAD_ON_START: ${PIPER_DOWNLOAD_ON_START:-true}
    volumes:
      - piper-data:/data/piper
    ports:
      - "8011:8011"

  kokoro-runtime:
    build:
      context: ./engines/kokoro-runtime
    ports:
      - "8012:8012"

  vieneu-runtime:
    build:
      context: ./engines/vieneu-runtime
    ports:
      - "8013:8013"

  api:
    environment:
      PIPER_BASE_URL: http://piper-runtime:8011
      KOKORO_BASE_URL: http://kokoro-runtime:8012
      VIENEU_TTS_BASE_URL: http://vieneu-runtime:8013
    depends_on:
      - piper-runtime
      - kokoro-runtime
      - vieneu-runtime

  worker:
    environment:
      PIPER_BASE_URL: http://piper-runtime:8011
      KOKORO_BASE_URL: http://kokoro-runtime:8012
      VIENEU_TTS_BASE_URL: http://vieneu-runtime:8013
    depends_on:
      - piper-runtime
      - kokoro-runtime
      - vieneu-runtime

volumes:
  piper-data:
